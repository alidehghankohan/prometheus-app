<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMETHEUS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
min-height: 100vh;
background: linear-gradient(135deg, #0a0010 0%, #0f0020 50%, #0a0018 100%);
font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
direction: rtl;
color: #e2e8f0;
padding: 24px 16px;
}
header { text-align: center; margin-bottom: 32px; }
.badge {
display: inline-block;
background: rgba(192,132,252,0.15);
border: 1px solid rgba(192,132,252,0.3);
border-radius: 20px;
padding: 4px 16px;
font-size: 11px;
color: #c084fc;
letter-spacing: 2px;
margin-bottom: 12px;
}
h1 {
font-size: clamp(26px, 6vw, 46px);
font-weight: 900;
background: linear-gradient(90deg, #c084fc, #e879f9, #f0abfc);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 8px;
}
.subtitle { color: #94a3b8; font-size: 14px; }
.card {
background: rgba(255,255,255,0.03);
border: 1px solid rgba(192,132,252,0.15);
border-radius: 16px;
padding: 24px;
max-width: 860px;
margin: 0 auto 24px;
}
#runBtn {
width: 100%;
padding: 16px;
background: linear-gradient(135deg, #7c3aed, #a855f7);
border: none;
border-radius: 12px;
color: #fff;
font-size: 16px;
font-weight: 700;
cursor: pointer;
font-family: inherit;
}
#runBtn:disabled { opacity: 0.5; cursor: not-allowed; }
.error-box {
color: #f87171;
background: rgba(248,113,113,0.1);
border: 1px solid rgba(248,113,113,0.2);
border-radius: 8px;
padding: 12px 16px;
font-size: 14px;
margin-top: 16px;
display: none;
}
.loader { text-align: center; padding: 40px; display: none; }
.loader p { color: #94a3b8; font-size: 14px; margin-top: 12px; }
.emoji-row { font-size: 28px; letter-spacing: 4px; }
.emoji-row span { display: inline-block; animation: pulse 1.4s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
.tabs {
display: flex;
gap: 8px;
flex-wrap: wrap;
margin: 24px 0 16px;
justify-content: center;
}
.tab-btn {
padding: 8px 14px;
border-radius: 8px;
border: 1px solid rgba(255,255,255,0.08);
background: rgba(255,255,255,0.03);
color: #94a3b8;
cursor: pointer;
font-size: 13px;
font-family: inherit;
}
.tab-btn.active {
border-color: #c084fc;
background: rgba(192,132,252,0.15);
color: #e879f9;
font-weight: 700;
}
.content-box {
background: rgba(0,0,0,0.3);
border-radius: 12px;
padding: 20px;
min-height: 200px;
display: none;
}
.content-box h3 { color: #c084fc; font-size: 15px; margin: 16px 0 6px; }
.content-box h2 { color: #e879f9; font-size: 16px; margin: 20px 0 8px; }
.content-box .bold-line { color: #f0abfc; font-weight: 700; margin: 10px 0 2px; }
.content-box ul { padding-right: 20px; margin: 4px 0; }
.content-box li { color: #e2e8f0; margin: 4px 0; line-height: 1.7; }
.content-box p { color: #cbd5e1; margin: 4px 0; line-height: 1.8; }
#resultArea { display: none; }
</style>
</head>
